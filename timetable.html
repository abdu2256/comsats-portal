<!DOCTYPE html>
<html>
<head>
    <title>Class Timetable</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Weekly Class Timetable</h1>
</header>

<section class="hero">

<table class="timetable">

<tr>
<th>Day</th>
<th>9 - 10</th>
<th>10 - 11</th>
<th>11 - 12</th>
<th>12 - 1</th>
</tr>

<tr>
<td>Monday</td>
<td class="pf">PF</td>
<td class="ds">DS</td>
<td class="db">DB</td>
<td>Break</td>
</tr>

<tr>
<td>Tuesday</td>
<td class="ds">DS</td>
<td class="pf">PF</td>
<td>Free</td>
<td class="db">DB</td>
</tr>

<tr>
<td>Wednesday</td>
<td class="db">DB</td>
<td>Free</td>
<td class="pf">PF</td>
<td class="ds">DS</td>
</tr>

<tr>
<td>Thursday</td>
<td>Free</td>
<td class="db">DB</td>
<td class="ds">DS</td>
<td class="pf">PF</td>
</tr>

<tr>
<td>Friday</td>
<td class="pf">PF</td>
<td>Free</td>
<td class="db">DB</td>
<td class="ds">DS</td>
</tr>

</table>

</section>

</body>
</html>
