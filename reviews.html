<!DOCTYPE html>
<html>
<head>
    <title>Teacher Reviews</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Teacher Reviews</h1>
</header>

<section class="hero">

    <h2>Add Review</h2>

    <input type="text" id="teacher" placeholder="Teacher Name"><br><br>
    <input type="number" id="rating" placeholder="Rating (1-5)"><br><br>
    <input type="text" id="review" placeholder="Write Review"><br><br>

    <button onclick="addReview()">Submit Review</button>

</section>

<div class="card-container" id="reviewContainer">

</div>

<script src="js/script.js"></script>
<script>
showReviews();
</script>
</body>
</html>
